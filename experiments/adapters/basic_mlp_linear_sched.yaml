dataset: 'data/dataset/nontrivial_100.jsonl'
table: 'qwen06_chunks'
target_column: 'vector'
metric: 'IP'
embedder: 'Qwen/Qwen3-Embedding-0.6B'
normalize: True
strategy: 'multiple_query_expansion'
query_expanders:
  - identity
  - add_prev_2
interleave: True
