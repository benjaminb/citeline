dataset: 'data/dataset/nontrivial_checked.jsonl'
table: 'qwen06_chunks'
target_column: 'vector'
metric: 'IP'
embedder: 'Qwen/Qwen3-Embedding-0.6B'
normalize: True
strategy: 'multiple_query_expansion'
query_expanders:
  - identity
  - add_prev_2
interleave: True
nn: data/nn_models/no_sched/addprev02_pos_only.pt/best_model.pt
batch_size: 8
top_k: 1000
probes: 1024
output_path: 'experiments/adapters/results/'
output_search_results: False
plot_label: 'Add02/Basic MLP/Pos Only/No Loss Sched'
