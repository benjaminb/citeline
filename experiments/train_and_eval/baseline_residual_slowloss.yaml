# Unified train-then-eval config.
# Run with: python train_and_eval.py --config experiments/train_and_eval/example.yaml
#
# All artifacts (checkpoints, plots, results) are written under output_dir/.
# The 'nn' and 'output_path' keys in the experiment section are set automatically."
output_dir: 'experiments/train_and_eval/results/baseline_residual_slowloss/'

training:
  parquet_datadir: 'data/nn_datasets/addprev02_orig_dataset/'
  h5_datadir: 'data/nn_datasets/addprev02_orig_dataset/h5/'
  strategy: 'InterleavedStrategy'
  num_positives: 1
  num_negatives: 1
  dataset_class: BasicTripletDataset
  model: ResidualEmbeddingMapper
  loss: BasicTripletCosineLoss
  loss_schedule: LinearSlow # Linear to 0.25 negative weight
  lr: 0.0001
  weight_decay: 0.0001
  batch_size: 32
  epochs: 80
  patience: 10

experiment:
  dataset: 'data/dataset/nontrivial_checked.jsonl'
  table: 'qwen06_chunks'
  target_column: 'vector'
  embedder: 'Qwen/Qwen3-Embedding-0.6B'
  metric: 'IP'
  normalize: true
  strategy: 'multiple_query_expansion'
  query_expanders:
    - 'add_prev_2'
  interleave: true
  batch_size: 8
  top_k: 1000
  output_search_results: false
