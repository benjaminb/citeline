# Full negative range, 4-bin graduated weighting, residual architecture.
# Hard negatives get 4x the gradient signal of easy ones.
# Use this to compare residual vs. plain MLP on the same weighting scheme.

dataset_dir: data/dataset/contrastive
temperature: 0.07
lr: 1e-4
weight_decay: 1e-2
batch_size: 256
epochs: 50
patience: 5
checkpoint_path: checkpoints/contrastive/graduated_residual.pt

model:
  arch: residual
  hidden_dims: [1024, 1024, 1024]   # 3 residual blocks at embedding width
  dropout: 0.1

negative_selection:
  num_negatives: 64
  rank_range: [0, 200]
  weight_scheme: bins
  num_bins: 4
  bin_weights: [4.0, 2.0, 1.0, 0.5]   # hardest bin weighted 4x, easiest 0.5x
